description: "A demo web server for testing, with no persistent volumes."
image: nginx:1.26-alpine
environment:
  NGINX_HOST: "@hostname@"
network:
  external:
    "@port@": "80"
  internal: {}
volumes: {}
questions:
  hostname:
    query: "What hostname should nginx serve?"
    type: hostname
  port:
    query: "What external port should nginx listen on?"
    type: port
notes:
  URL:
    value: "http://@hostname@:@port@"
    type: url
