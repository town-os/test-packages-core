image: nginx:2.0
environment:
  NGINX_HOST: "@hostname@"
network:
  external:
    "@port@": "80"
  internal: {}
volumes:
  html:
    mountpoint: /usr/share/nginx/html
  config:
    mountpoint: /etc/nginx/conf.d
questions:
  hostname: "What hostname should nginx serve?"
  port: "What external port should nginx listen on?"
