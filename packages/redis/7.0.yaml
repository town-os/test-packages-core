image: redis:7.0-alpine
environment:
  REDIS_PASSWORD: "@password@"
network:
  external: {}
  internal:
    "6379": "6379"
volumes:
  data:
    mountpoint: /data
    quota: "@maxmemory@"
questions:
  password:
    query: "What password should redis use?"
  maxmemory:
    query: "What is the maximum memory for redis data?"
    type: bytes
