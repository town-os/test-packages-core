description: "An in-memory data store used as a database, cache, and message broker."
image: redis:7.0-alpine
command: ["redis-server", "--bind", "0.0.0.0"]
environment:
  REDIS_PASSWORD: "@password@"
network:
  external: {}
  internal:
    "6379": "6379"
volumes:
  data:
    mountpoint: /data
    quota: "@maxmemory@"
questions:
  password:
    query: "What password should redis use?"
  maxmemory:
    query: "What is the maximum memory for redis data?"
    type: bytes
